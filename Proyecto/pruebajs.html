<!DOCTYPE html>
<html >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios</title>
    
</head>
<body>
    <h1>Ejercicios JavaScript</h1>

    <section>
        <h2>1. Contar</h2>
        <input type="number" id="numeroContar" placeholder="Escribe un número">
        <button id="btnContar">Contar</button>
        <p id="resultadoContar"></p>
    </section>

     <section>
        <h2>2. Sumar</h2>
        <input type="number" id="numero1Sumar" placeholder="Escribe un número">
        <input type="number" id="numero2Sumar" placeholder="Escribe un número">
        <button id="btnSumar">Sumar</button>
        <p id="resultadoSumar"></p>
    </section>


    <section>
        <h2>Adivinar el Número</h2>
        <input type="number" id="numeroAdivinar" placeholder="Número del 1-50"> 
        <button id="btnIntentar">Intentar</button>
        <p id="resultadoJuego"></p>
        <button id="btnReiniciar">Reiniciar juego</button>
    </section>
    
    

    <script src="js/pruebajs.js"></script>
</body>
</html>
